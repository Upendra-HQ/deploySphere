version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: deploysphere-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deploysphere-prod-network

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deploysphere-backend-prod
    restart: unless-stopped
    environment:
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      EMAIL_SERVICE: ${EMAIL_SERVICE:-mock}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}
    depends_on:
      postgres-db:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - deploysphere-prod-network

  frontend-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_WS_URL: ${VITE_WS_URL}
    container_name: deploysphere-frontend-prod
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend-api
    networks:
      - deploysphere-prod-network

  nginx-gateway:
    image: nginx:alpine
    container_name: deploysphere-nginx-gateway-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend-api
      - frontend-web
    networks:
      - deploysphere-prod-network

volumes:
  postgres_data:

networks:
  deploysphere-prod-network:
    driver: bridge


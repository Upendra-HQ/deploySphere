version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: deploysphere-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deploysphere-prod-network

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deploysphere-backend-prod
    restart: unless-stopped
    environment:
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      EMAIL_SERVICE: ${EMAIL_SERVICE:-mock}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://prometheus:9090}
      GRAFANA_URL: ${GRAFANA_URL:-http://grafana:3000}
      NODE_EXPORTER_URL: ${NODE_EXPORTER_URL:-http://node-exporter:9100}
      CADVISOR_URL: ${CADVISOR_URL:-http://cadvisor:8080}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}
    depends_on:
      postgres-db:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./nginx:/nginx
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - deploysphere-prod-network

  frontend-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_WS_URL: ${VITE_WS_URL}
    container_name: deploysphere-frontend-prod
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend-api
    networks:
      - deploysphere-prod-network

  nginx-gateway:
    image: nginx:alpine
    container_name: deploysphere-nginx-gateway-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend-api
      - frontend-web
    networks:
      - deploysphere-prod-network

  prometheus:
    image: prom/prometheus:latest
    container_name: deploysphere-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - deploysphere-prod-network

  grafana:
    image: grafana/grafana:latest
    container_name: deploysphere-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - deploysphere-prod-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: deploysphere-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)'
    ports:
      - "9100:9100"
    networks:
      - deploysphere-prod-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: deploysphere-cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8088:8080"
    networks:
      - deploysphere-prod-network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  deploysphere-prod-network:
    driver: bridge

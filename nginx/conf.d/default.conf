    listen 80 default_server;
    server_name _;

    location / {
        default_type text/html;
        return 404 "<html><head><title>DeploySphere Gateway</title><style>body{font-family:system-ui;background:#0a0e1a;color:#f1f5f9;display:flex;flex-direction:column;align-items:center;justify-content:center;height:90vh;margin:0}h1{font-weight:600;margin-bottom:0.5rem;background:linear-gradient(135deg, #6366f1, #8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}p{color:#94a3b8}</style></head><body><h1>DeploySphere Gateway</h1><p>The requested application is not deployed or has not mapped this routing hostname.</p></body></html>";
    }
}
